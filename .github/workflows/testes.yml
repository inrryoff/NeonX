name: NeonX Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Baixar o código do repositório
      uses: actions/checkout@v4

    - name: ⚡ Instalar Zig Compiler
      uses: mlugg/setup-zig@v1
      with:
        version: 0.11.0

    - name: 🔑 Dar permissão de execução aos scripts
      run: |
        chmod +x build.sh
        chmod +x verify_public.sh

    - name: 🔨 Compilar o Arsenal Completo (--ci)
      run: ./build.sh --ci

    - name: 🧪 Preparar e Testar Execução (Linux x64)
      run: |
        echo "📦 Descompactando o pacote Linux..."
        mkdir -p test_env
        unzip -q build/*linux*x64*.zip -d test_env/
        
        chmod +x test_env/neonx
        
        echo "🚀 Teste de Inicialização..."
        ./test_env/neonx --version
        
    - name: 🧪 Testar Pipeline de Cor (Modo Estático)
      run: |
        echo "🎨 Validando Shaders..."
        echo "NeonX Blindado e Operante!" | ./test_env/neonx -S -m 1
