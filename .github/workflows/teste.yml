name: CI Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-suite:
    name: Build & Functional Tests
    runs-on: ubuntu-latest

    steps:
      - name: рҹ“Ҙ Baixar cГіdigo fonte
        uses: actions/checkout@v4

      - name: вҡЎ Instalar ambiente Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: рҹӣ пёҸ Dar permissГЈo e Compilar Nativo
        run: |
          chmod +x build.sh
          # Usamos --native para gerar um binГЎrio executГЎvel no prГіprio runner do GitHub
          ./build.sh --native

      - name: рҹ§Ә Teste 1 - VerificaГ§ГЈo de Identidade e VersГЈo
        run: |
          echo "Testando a saГӯda de versГЈo..."
          OUTPUT=$(./build/neonx_native -v)
          echo "$OUTPUT"
          # Verifica se a string "NeonX" aparece na saГӯda
          if ! echo "$OUTPUT" | grep -q "NeonX"; then
            echo "Falha: Comando de versГЈo nГЈo retornou a string esperada."
            exit 1
          fi

      - name: рҹ§Ә Teste 2 - Menu de Ajuda (--help)
        run: |
          ./build/neonx_native --help > /dev/null
          echo "Menu de ajuda executado com sucesso."

      - name: рҹ§Ә Teste 3 - RenderizaГ§ГЈo EstГЎtica (Modo -S)
        run: |
          echo "Testando pipe de texto com Modo EstГЎtico..."
          # Passa um banner de texto e exige saГӯda imediata (-S)
          echo -e "NEONX\nTEST BANNER" | ./build/neonx_native -m 7 -S -o 0 > result.txt
          
          # Verifica se o arquivo gerado nГЈo estГЎ vazio
          if [ ! -s result.txt ]; then
            echo "Falha: O NeonX nГЈo gerou saГӯda no Modo EstГЎtico."
            exit 1
          fi
          echo "RenderizaГ§ГЈo estГЎtica OK."

      - name: рҹ§Ә Teste 4 - Processamento de Presets
        run: |
          echo "Testando presets de shader..."
          echo "CYBERPUNK" | ./build/neonx_native -S --preset cyberpunk > /dev/null
          echo "MATRIX" | ./build/neonx_native -S --preset matrix > /dev/null
          echo "RETRO" | ./build/neonx_native -S --preset retro > /dev/null
          echo "Presets validados com sucesso."

      - name: рҹ§Ә Teste 5 - Limite de DuraГ§ГЈo (-d)
        run: |
          echo "Testando loop de animaГ§ГЈo com auto-kill de 1 segundo..."
          # O script deve rodar por 1 segundo e fechar sozinho (status 0)
          echo "ANIMATION TEST" | ./build/neonx_native -m 1 -d 1
          echo "DuraГ§ГЈo limite testada com sucesso."

      - name: рҹ§Ә Teste 6 - Bateria de Spinners (--spin)
        run: |
          echo "Testando gerador de paleta spinner..."
          ./build/neonx_native --spin > /dev/null
          echo "Spinner OK."

      - name: рҹ§Ә Teste 7 - Cross-Compile de SeguranГ§a (ARM64)
        run: |
          echo "Garantindo que compila para Android/ARM64 via Zig..."
          ./build.sh --target aarch64-linux-musl --output neonx --label test-arm64
          if [ ! -f "build/neonx_test-arm64.zip" ]; then
            echo "Falha no empacotamento do Cross-Compile."
            exit 1
          fi
          echo "Cross-compile OK."

