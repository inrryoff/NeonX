name: NeonX CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-validate:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v4

      - name: ⚡ Instalar ambiente Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: ⚙️ Instalar Dependências (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign unzip expect jq
          chmod +x *.sh tests/*.sh

      - name: ⚙️ Instalar Dependências (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install minisign
          chmod +x *.sh tests/*.sh

      - name: 🛠️ Build e Teste Completo (Nativo + Integração)
        run: |
          ./build.sh --test
        shell: bash

      - name: 🧪 Verificação de Assinatura Comunitária
        run: |
          BIN="./build/neonx"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then BIN="./build/neonx.exe"; fi
          
          # Deve passar com 0
          $BIN --verify-sig
          
          # Deve conter informações da comunidade
          $BIN -v | grep -q "COMMUNITY"
          $BIN -v | grep -q "VALID_SIG_BY"
          
          echo "✅ Validação de assinatura comunitária concluída."
        shell: bash

      - name: 🧪 Teste Avançado de Estabilidade (Fuzzing leve de flags)
        run: |
          BIN="./build/neonx"
          if [ "${{ runner.os }}" = "Windows" ]; then BIN="./build/neonx.exe"; fi
          
          echo "Testando combinações complexas..."
          # Stream + Preset + Quantização
          echo "Stream Test" | $BIN -L --preset matrix --quantized -d 0.1
          
          # Opacidade extrema + Ângulo + Modo Radial
          echo "Visual Test" | $BIN -m 5 -o 1.0 -A 359 -S
          
          # Spin redirection
          $BIN --spin | grep -q "38;2;"
          
          echo "✅ Estabilidade confirmada."
        shell: bash

      - name: 🧪 Teste 4 - Internacionalização (i18n)
        run: |
          # Garantir que o ambiente de shell trate a saída como UTF-8
          export LC_ALL=en_US.UTF-8 || export LC_ALL=C.UTF-8 || true
          export LANG=en_US.UTF-8 || export LANG=C.UTF-8 || true
          
          BIN="./build/neonx"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then BIN="./build/neonx.exe"; fi
          
          echo "Testando idioma Espanhol (ASCII)..."
          $BIN --lang es --help | grep -qi "uso:"
          
          echo "Testando idioma Chinês (UTF-8 Multi-byte)..."
          # No Windows/macOS, o grep pode ser sensível ao locale do sistema para caracteres multi-byte.
          # Vamos tentar capturar e mostrar os primeiros bytes para depuração se falhar.
          if ! $BIN --lang zh --help | grep -q "用法"; then
            echo "❌ Falha ao detectar '用法' (Chinês) no output."
            echo "Output bruto (primeiras 10 linhas):"
            $BIN --lang zh --help | head -n 10
            exit 1
          fi
          
          echo "✅ Internacionalização operante em todas as plataformas."
        shell: bash
