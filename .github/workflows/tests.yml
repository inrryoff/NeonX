name: NeonX CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-validate:
    name: Build, Test & Security
    runs-on: ubuntu-latest

    steps:
      - name: рҹ“Ҙ Checkout do RepositГіrio
        uses: actions/checkout@v4

      - name: вҡЎ Instalar ambiente Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: вҡҷпёҸ Instalar DependГӘncias de Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign unzip expect jq
          chmod +x *.sh

      - name: рҹӣ пёҸ Build 1 - Script GenГ©rico (--native)
        run: |
          echo "Testando compilaГ§ГЈo genГ©rica via build.sh..."
          ./build.sh --native

      - name: рҹӣ пёҸ Build 2 - Script Termux Edition (Make-NeonX.sh)
        run: |
          echo "Testando auto-versionamento e pipeline interativa..."
          # Passa "1" e "0" para navegar no menu interativo (Build Nativa e Sair)
          echo -e "1\n0\n" | ./Make-NeonX.sh

      - name: рҹ§Ә Teste 1 - Core Info (Version, License, Help, Self-Verify)
        run: |
          echo "Validando saГӯdas institucionais..."
          ./build/neonx -v | grep -q "NeonX"
          ./build/neonx --license | grep -q "USAGE LICENSE"
          ./build/neonx --help | grep -q "Usage:"
          
          echo "Validando comportamento do self-check..."
          set +e
          ./build/neonx --verify-sig
          SIG_EXIT=$?
          set -e
          # No CI nГЈo teremos as assinaturas finais, entГЈo deve falhar e retornar 1 ou 2
          if [[ $SIG_EXIT -eq 0 ]]; then
            echo "вқҢ ERRO CRГҚTICO: O binГЎrio validou uma assinatura inexistente no CI!"
            exit 1
          fi
          echo "вң… Self-check se comportou como esperado (rejeitou binГЎrio nГЈo assinado)."

      - name: рҹ§Ә Teste 2 - InternacionalizaГ§ГЈo (i18n)
        run: |
          echo "Testando detecГ§ГЈo de idiomas nas mensagens de erro e ajuda..."
          # Teste ChinГӘs
          LANG=zh_CN.UTF-8 ./build/neonx --help | grep -q "з”Ёжі•"
          # Teste Espanhol
          LANG=es_ES.UTF-8 ./build/neonx --help | grep -qi "uso:"
          # Teste PortuguГӘs
          LANG=pt_BR.UTF-8 ./build/neonx --help | grep -qi "uso:"
          echo "вң… InternacionalizaГ§ГЈo operante."

      - name: рҹ§Ә Teste 3 - Tratamento de Erros e Exit Codes
        run: |
          echo "Testando a resiliГӘncia do parser de argumentos..."
          set +e
          
          # Erro 3: Letra onde deveria ser nГәmero
          echo "teste" | ./build/neonx -s abc > /dev/null 2>&1
          E_NUM=$?
          
          # Erro 4: Limite do modo de animaГ§ГЈo excedido
          echo "teste" | ./build/neonx -m 99 > /dev/null 2>&1
          E_MOD=$?
          
          # Erro 5: Falta de dados via STDIN (TTY check)
          ./build/neonx > /dev/null 2>&1
          E_TTY=$?
          
          set -e
          
          if [[ $E_NUM -ne 3 || $E_MOD -ne 4 || $E_TTY -ne 5 ]]; then
            echo "вқҢ ERRO: CГіdigos de saГӯda divergentes! (Num=$E_NUM, Mod=$E_MOD, TTY=$E_TTY)"
            exit 1
          fi
          echo "вң… CГіdigos de erro validados perfeitamente."

      - name: рҹ§Ә Teste 4 - Modos de RenderizaГ§ГЈo (EstГЎtico e Stream)
        run: |
          echo "Testando Modo EstГЎtico (-S)..."
          echo "NEONX STATIC" | ./build/neonx -m 7 -S -o 0 > static.txt
          if [[ ! -s static.txt ]]; then exit 1; fi
          
          echo "Testando Modo Stream (-L) massivo..."
          seq 1 1500 | ./build/neonx -L -d 1 > /dev/null
          echo "вң… Modos de renderizaГ§ГЈo concluГӯdos sem memory leaks aparentes."

      - name: рҹ§Ә Teste 5 - Presets e Shaders Core
        run: |
          echo "Injetando presets nos shaders..."
          echo "TEXT" | ./build/neonx -S --preset cyberpunk > /dev/null
          echo "TEXT" | ./build/neonx -S --preset matrix > /dev/null
          echo "TEXT" | ./build/neonx -S --preset retro > /dev/null
          echo "TEXT" | ./build/neonx -S --preset sunset > /dev/null
          
          echo "Testando paleta pura ANSI (Spin)..."
          ./build/neonx --spin > spin.txt
          grep -q "38;2;" spin.txt
          echo "вң… Presets e Spinners funcionais."

      - name: рҹ§Ә Teste 6 - Stress Test (Todas as Flags Combinadas)
        run: |
          echo "Aplicando estresse extremo de argumentos..."
          # Combina quase todas as flags matemГЎticas para garantir que nГЈo hГЎ crash de colisГЈo
          echo "NEONX STRESS" | ./build/neonx -m 11 -s 0.8 -f 1.5 -A 45 -p 100 -c 50 -o 0.7 -F 120 --quantized -d 1 > /dev/null
          echo "вң… O motor sobreviveu ao Stress Test de configuraГ§ГЈo matemГЎtica."

      - name: рҹ§Ә Teste 7 - Cross-Compile Matrix (ARM64 e Windows)
        run: |
          echo "Testando compilaГ§ГЈo Android/Linux ARM64..."
          ./build.sh --target aarch64-linux-musl --output neonx --label arm64
          
          echo "Testando compilaГ§ГЈo Windows x64..."
          ./build.sh --target x86_64-windows-gnu --output neonx --label win64
          
          if [[ ! -f "bzip/neonx_arm64.zip" || ! -f "bzip/neonx_win64.zip" ]]; then
            echo "вқҢ ERRO: Empacotamento Cross-Compile falhou!"
            exit 1
          fi
          echo "вң… MГәltiplas arquiteturas compiladas com sucesso."

      - name: рҹ§Ә Teste 8 - VerificaГ§ГЈo de Integridade e Minisign (Negative Test)
        run: |
          echo "Assegurando que binГЎrios nГЈo assinados sГЈo barrados pelo verify.sh..."
          set +e
          # Tentando verificar um zip localmente gerado sem chaves privadas
          ./verify.sh ./bzip/neonx_arm64.zip
          EXIT_CODE=$?
          set -e
          
          if [[ $EXIT_CODE -eq 1 ]]; then
            echo "вң… SUCESSO: O verify.sh interceptou e barrou o binГЎrio corretamente."
          else
            echo "вқҢ ERRO CRГҚTICO: verify.sh falhou em proteger o ecossistema (Exit: $EXIT_CODE)!"
            exit 1
          fi

      - name: рҹ§Ә Teste 9 - RenderizaГ§ГЈo Wide-Buffer (UTF-8)
        run: |
          echo "Desenhando Banner UTF-8 Complexo..."
          cat << 'EOF' | ./build/neonx -d 2 -m 10 -o 0.5 -F 60 --quantized
          в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
          в•‘                                                                  в•‘
          в•‘  в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв•—в–‘в–‘в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–‘в–Ҳв–Ҳв•—в–‘в–‘в–‘в–Ҳв–Ҳв•—в–‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—   в•‘
          в•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв•—в–‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в•ҡв–Ҳв–Ҳв•—в–‘в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ   в•‘
          в•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–‘в–Ҳв–Ҳв•‘в–‘в–‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–‘в–‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–‘в–‘   в•‘
          в•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–‘в–‘в•ҡв–Ҳв–Ҳв•”в•қв–‘в–‘в–Ҳв–Ҳв•‘в–‘в–‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•қв–‘в–‘в–Ҳв–Ҳв•”в•җв•җв•қв–‘в–‘   в•‘
          в•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–‘в•ҡв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–‘в–‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–‘в–‘в–Ҳв–Ҳв•‘в–‘в–‘в–‘в–Ҳв–Ҳв•‘в–‘в–‘в–‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘в–‘в–‘в–‘в–‘в–‘в–Ҳв–Ҳв•‘в–‘в–‘в–‘в–‘в–‘   в•‘
