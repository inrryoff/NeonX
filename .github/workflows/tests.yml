name: Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.11.0

      - name: Build (native)
        run: |
          zig cc src/*.c -o neonx -target $(uname -m)-linux-musl -static \
            -O2 -DVERSION="test" -DBUILD_STATUS="UNOFFICIAL" \
            -DBUILD_MAINTAINER="CI" -DSECRET_KEY="testkey" -lm

      - name: Test help output
        run: |
          ./neonx -h | grep -q "Uso: cat arquivo"
          echo "✓ Help ok"

      - name: Test version output
        run: |
          ./neonx -v | grep -q "Status: UNOFFICIAL"
          echo "✓ Version shows unofficial"

      - name: Test integrity warning (without --allow-mod)
        run: |
          # Build não oficial deve exibir o aviso amarelo
          output=$(./neonx -v 2>&1)
          if echo "$output" | grep -q "AVISO DE INTEGRIDADE"; then
            echo "✓ Integrity warning displayed"
          else
            echo "✗ Expected integrity warning not found"
            exit 1
          fi

      - name: Test --allow-mod flag
        run: |
          output=$(./neonx --allow-mod -v 2>&1)
          if ! echo "$output" | grep -q "AVISO DE INTEGRIDADE"; then
            echo "✓ Warning suppressed with --allow-mod"
          else
            echo "✗ Warning should not appear with --allow-mod"
            exit 1
          fi

      - name: Test basic shader pipeline
        run: |
          echo "NeonX test" | ./neonx --preset cyberpunk > /dev/null
          echo "✓ Shader applied"

      - name: Test license option
        run: |
          ./neonx --license | grep -q "LICENÇA DE USO"
          echo "✓ License displayed"
