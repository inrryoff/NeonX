name: Detailed Functional Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Setup Environment"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential valgrind
          mkdir -p build

      - name: "Compile for Testing"
        run: |
          gcc src/*.c -o build/neonx_test -lm -O2 -g -DVERSION='"TEST-SUITE"' -DBUILD_STATUS='"TESTING"' -DBUILD_MAINTAINER='"GitHub-Actions"'

      - name: "Test 1 Basic Execution and Help"
        run: |
          ./build/neonx_test --help | grep -q "Uso: cat arquivo | neonx"
          if [ $? -eq 0 ]; then echo "Help text verified."; else exit 1; fi

      - name: "Test 2 Version and Metadata"
        run: |
          ./build/neonx_test --version | grep -q "NeonX"
          ./build/neonx_test --version | grep -q "MODIFICADO"
          echo "Metadata check passed."

      - name: "Test 3 Static Mode Smoke Test"
        run: |
          echo "NeonX Test Line" | ./build/neonx_test -S -m 1
          echo "Static render completed successfully."

      - name: "Test 4 Mode Range Verification"
        run: |
          for m in {0..11}; do
            echo "Testing mode $m"
            echo "Test" | ./build/neonx_test -S -m $m > /dev/null
          done
          echo "All animation modes executed without crashing."

      - name: "Test 5 Memory Leak Check Valgrind"
        run: |
          echo "Valgrind check..."
          echo "NeonX Memory Test" | valgrind --leak-check=full --error-exitcode=1 ./build/neonx_test -S -m 10
          echo "Memory check passed."

      - name: "Test 6 Argument Parsing Stress"
        run: |
          echo "Test" | ./build/neonx_test -S -s 0.5 -f 1.0 -o 0.5 -D 0.2 -c 100
          echo "Complex argument parsing passed."
          
