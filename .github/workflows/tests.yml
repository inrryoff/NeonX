name: CI Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-suite:
    name: Build & Functional Tests
    runs-on: ubuntu-latest

    steps:
      - name: рҹ“Ҙ Baixar cГіdigo fonte
        uses: actions/checkout@v4

      - name: вҡЎ Instalar ambiente Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: вҡҷпёҸ Instalar dependГӘncias (Minisign)
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: вҡҷпёҸ Instalar dependГӘncias (unzip)
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: рҹӣ пёҸ Dar permissГЈo e Compilar Nativo
        run: |
          chmod +x build.sh
          ./build.sh --native

      - name: рҹ§Ә Teste 1 - VerificaГ§ГЈo de Identidade e VersГЈo
        run: |
          echo "Testando a saГӯda de versГЈo..."
          OUTPUT=$(./build/neonx -v)
          echo "$OUTPUT"
          if ! echo "$OUTPUT" | grep -q "NeonX"; then
            echo "Falha: Comando de versГЈo nГЈo retornou a string esperada."
            exit 1
          fi

      - name: рҹ§Ә Teste 2 - VerificaГ§ГЈo de SeguranГ§a (Negative Test)
        run: |
          echo "Testando a VerificaГ§ГЈo com verify.sh..."
          set +e
          ./verify.sh ./build/neonx
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 1 ]; then
            echo "вң… SUCESSO: O verify.sh barrou o binГЎrio de teste corretamente!"
            exit 0
          else
            echo "вқҢ ERRO CRГҚTICO: O verify.sh aceitou um binГЎrio modificado (ou deu outro erro)!"
            exit 1
          fi

      - name: рҹ§Ә Teste 3 - Menu de Ajuda (--help)
        run: |
          ./build/neonx --help > /dev/null
          echo "Menu de ajuda executado com sucesso."

      - name: рҹ§Ә Teste 4 - RenderizaГ§ГЈo EstГЎtica (Modo -S)
        run: |
          echo "Testando pipe de texto com Modo EstГЎtico..."
          echo -e "NEONX\nTEST BANNER" | ./build/neonx -m 7 -S -o 0 > result.txt
          if [ ! -s result.txt ]; then
            echo "Falha: O NeonX nГЈo gerou saГӯda no Modo EstГЎtico."
            exit 1
          fi
          echo "RenderizaГ§ГЈo estГЎtica OK."

      - name: рҹ§Ә Teste 5 - Processamento de Presets
        run: |
          echo "Testando presets de shader..."
          echo "CYBERPUNK" | ./build/neonx -S --preset cyberpunk > /dev/null
          echo "MATRIX" | ./build/neonx -S --preset matrix > /dev/null
          echo "RETRO" | ./build/neonx -S --preset retro > /dev/null
          echo "Presets validados com sucesso."

      - name: рҹ§Ә Teste 6 - Limite de DuraГ§ГЈo (-d)
        run: |
          echo "Testando loop de animaГ§ГЈo com auto-kill de 1 segundo..."
          echo "ANIMATION TEST" | ./build/neonx -m 1 -d 1
          echo "DuraГ§ГЈo limite testada com sucesso."

      - name: рҹ§Ә Teste 7 - Bateria de Spinners (--spin)
        run: |
          echo "Testando gerador de paleta spinner..."
          ./build/neonx --spin > /dev/null
          echo "Spinner OK."

      - name: рҹ§Ә Teste 9 - Cross-Compile de SeguranГ§a (ARM64)
        run: |
          echo "Garantindo que compila para Android/ARM64 via Zig..."
          ./build.sh --target aarch64-linux-musl --output neonx --label test-arm64
          if [ ! -f "bzip/neonx_test-arm64.zip" ]; then
            echo "Falha no empacotamento do Cross-Compile."
            exit 1
          fi
          echo "Cross-compile OK."

      - name: рҹ§Ә Teste 10 - VerificaГ§ГЈo de SeguranГ§a (Negative Test (zips))
        run: |
          echo "Testando a VerificaГ§ГЈo com verify.sh..."
          set +e
          ./verify.sh ./bzip/neonx_test-arm64.zip
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 1 ]; then
            echo "вң… SUCESSO: O verify.sh barrou o binГЎrio de teste corretamente!"
            exit 0
          else
            echo "вқҢ ERRO CRГҚTICO: O verify.sh aceitou um binГЎrio modificado (ou deu outro erro)!"
            exit 1
          fi

