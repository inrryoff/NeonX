name: C Build CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang
        
    - name: Build NeonX (GCC)
      run: |
        mkdir -p build
        gcc src/*.c -o build/neonx -lm -O3 -DVERSION="CI-BUILD" -DBUILD_STATUS="UNOFFICIAL" -DBUILD_MAINTAINER="GitHub-Actions"
        
    - name: Build NeonX (Clang)
      run: |
        clang src/*.c -o build/neonx_clang -lm -O3 -DVERSION="CI-BUILD"
        
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: neonx-linux-x64
        path: build/neonx
